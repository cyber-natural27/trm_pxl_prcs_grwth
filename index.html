<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRM_PXL_PRCS // PRO // V10.5_LUSH_MAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-main: rgb(0, 64, 255); --accent-glow: rgba(0, 64, 255, 0.6); 
            --accent-hover: #00ff04; --bg-main: #000000; --bg-sidebar: #000000;
            --ui-text: var(--accent-main); --group-separator: rgba(0, 64, 255, 0.9);
            --danger: #ff4444; --button-hover: #00ff04; --ui-glow: 0 0 15px var(--accent-glow);
            --sidebar-w: 320px; --top-h: 150px;
        }
        body.light-mode {
            --bg-sidebar: #edead7; --bg-main: #f5f3e7; --ui-text: rgb(0, 64, 255);
            --accent-main: rgb(0, 64, 255); --group-separator: rgba(0, 64, 255, 0.3);
            --ui-glow: none;
        }
        body { 
            background: var(--bg-main); color: var(--ui-text); font-family: 'JetBrains Mono', monospace; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; text-shadow: var(--ui-glow);
        }

        #sidebar { 
            width: var(--sidebar-w); flex-shrink: 0; padding: 30px 20px; 
            border-right: 1px solid var(--group-separator); background: var(--bg-sidebar);
            overflow-y: auto; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; z-index: 30;
        }

        #main-layout { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        #top-bar {
            height: var(--top-h); background: var(--bg-sidebar); border-bottom: 1px solid var(--group-separator);
            display: grid; grid-template-columns: 1fr 1fr 260px;
            padding: 10px 20px; gap: 20px; box-sizing: border-box; z-index: 20;
            overflow-x: auto; flex-shrink: 0; align-items: end;
            padding-bottom: 15px;
        }
        
        #viewport {
            flex-grow: 1;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        #canvas-container { 
            transition: transform 0.1s ease-out; 
            transform-origin: center;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        
        .grid-column { display: flex; flex-direction: column; gap: 10px; justify-content: end; }
        .control-row { display: flex; flex-direction: column; gap: 2px; }

        .stepper { display: flex; align-items: center; gap: 10px; width: 100%; }
        .step-btn { width: 26px; height: 26px; font-size: 14px; display: grid; place-items: center; flex-shrink: 0; font-weight: 300; }

        input[type="range"] { 
            flex-grow: 1; appearance: none; background: transparent; cursor: crosshair; 
            height: 30px; 
        }
        input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--ui-text); }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; height: 18px; width: 10px; 
            background: var(--ui-text); margin-top: -8px; 
            border: 1px solid var(--bg-main);
        }

        #chaos-container {
            position: fixed; right: 30px; top: 250px; 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 1001; width: 60px; 
        }

        #recordBtn {
            width: 15px; height: 15px; border-radius: 50%; 
            background: #ff4444; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; margin-bottom: 40px;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); 
            transition: 0.3s; flex-shrink: 0;
        }

        input[type="range"].vertical {
            appearance: none; -webkit-appearance: none;
            background: transparent; cursor: crosshair;
            transform: rotate(-90deg); width: 400px; height: 40px; margin-top: 180px; 
        }

        input[type="range"].vertical::-webkit-slider-runnable-track { height: 2px; background: var(--accent-hover); }
        input[type="range"].vertical::-webkit-slider-thumb {
            appearance: none; -webkit-appearance: none;
            height: 18px; width: 10px; background: var(--accent-hover);
            margin-top: -8px; border: 1px solid var(--bg-main);
        }

        #canvas-container.projected-fullscreen {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            z-index: 5000 !important; background: black !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
            transform: scale(1) !important;
        }
        #canvas-container.projected-fullscreen canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        canvas { image-rendering: pixelated; box-shadow: 0 0 100px rgba(0,0,0,0.8); }

        .group { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--group-separator); padding-bottom: 12px; }
        label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; font-weight: 500; text-align: center; }
        h2.title-btn { font-weight: 100; font-size: .8rem; letter-spacing: 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        h2.title-btn:hover { color: var(--button-hover); text-shadow: 0 0 10px var(--button-hover); }

        button, .btn-outline, select {
            background: transparent; border: 1px solid var(--ui-text); color: var(--ui-text); 
            cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.2s ease;
        }
        button:hover, .btn-outline:hover { background: var(--button-hover); color: #000; box-shadow: 0 0 15px var(--button-hover); }

        .reset-btn-large { 
            border: 2px solid var(--danger) !important; color: var(--danger) !important; 
            font-weight: bold; padding: 15px !important; font-size: 11px !important; margin-top: 5px;
        }
        .reset-btn-large:hover { 
            background: var(--danger) !important; color: #ffffff !important; 
            box-shadow: 0 0 20px var(--danger), 0 0 40px rgba(255, 68, 68, 0.4); 
        }
        
        .action-group { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-bottom: 2px; }
        .sub-action-row { display: grid; grid-template-columns: 1fr 45px; gap: 8px; height: 35px; }

        #settings-menu { 
            position: absolute; top: 160px; right: 20px; 
            background: var(--bg-sidebar); border: 1px solid var(--ui-text); 
            padding: 20px; display: none; flex-direction: column; gap: 15px; 
            z-index: 2000; min-width: 240px; box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        #settings-menu.open { display: flex; }

        #zoom-controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 10px; z-index: 1000; }
        .zoom-btn { width: 40px; height: 40px; background: var(--bg-sidebar); border: 1px solid var(--ui-text); display: grid; place-items: center; cursor: pointer; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 class="title-btn" onclick="exportImg()">[TRM_PXL_PRCS // PRO]</h2>
    <button class="btn-outline" style="padding:12px" onclick="initAudio(); document.getElementById('upload').click()">SOURCE_LOAD</button>
    <button class="btn-outline reset-btn-large" onclick="resetSystem()">SYSTEM_RESET</button>
    <input type="file" id="upload" style="display:none" accept="image/*">

    <div class="group" style="margin-top:20px">
        <label>PXL // DTHR // HLF_TNE</label>
        <div class="stepper"><button class="step-btn" onclick="step('pixelSize',-1)">-</button><input type="range" id="pixelSize" min="1" max="25" value="1"><button class="step-btn" onclick="step('pixelSize',1)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('dither',-10)">-</button><input type="range" id="dither" min="0" max="255" value="0"><button class="step-btn" onclick="step('dither',10)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('halftone',-1)">-</button><input type="range" id="halftone" min="0" max="20" value="0"><button class="step-btn" onclick="step('halftone',1)">+</button></div>
    </div>

    <div class="group">
        <label>BLM // SCNL // GRN</label>
        <div class="stepper"><button class="step-btn" onclick="step('bloom',-2)">-</button><input type="range" id="bloom" min="0" max="40" value="0"><button class="step-btn" onclick="step('bloom',2)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('scanLines',-10)">-</button><input type="range" id="scanLines" min="0" max="100" value="0"><button class="step-btn" onclick="step('scanLines',10)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('grain',-5)">-</button><input type="range" id="grain" min="0" max="100" value="0"><button class="step-btn" onclick="step('grain',5)">+</button></div>
    </div>

    <div class="group">
        <label>ABR // GLTCH</label>
        <div class="stepper"><button class="step-btn" onclick="step('aberration',-1)">-</button><input type="range" id="aberration" min="0" max="30" value="0"><button class="step-btn" onclick="step('aberration',1)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('glitchShift',-5)">-</button><input type="range" id="glitchShift" min="0" max="100" value="0"><button class="step-btn" onclick="step('glitchShift',5)">+</button></div>
    </div>

    <div class="group">
        <label>B // C // S // G</label>
        <div class="stepper"><button class="step-btn" onclick="step('bright',-5)">-</button><input type="range" id="bright" min="-100" max="100" value="0"><button class="step-btn" onclick="step('bright',5)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('cont',-5)">-</button><input type="range" id="cont" min="-100" max="100" value="0"><button class="step-btn" onclick="step('cont',5)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('saturate',-5)">-</button><input type="range" id="saturate" min="0" max="200" value="100"><button class="step-btn" onclick="step('saturate',5)">+</button></div>
        <div class="stepper"><button class="step-btn" onclick="step('gamma',-1)">-</button><input type="range" id="gamma" min="5" max="30" value="10"><button class="step-btn" onclick="step('gamma',1)">+</button></div>
    </div>
</aside>

<div id="main-layout">
    <header id="top-bar">
        <div class="grid-column">
            <div class="control-row"><label>MASTER_SPD</label><div class="stepper"><button class="step-btn" onclick="step('masterSpeed',-10)">-</button><input type="range" id="masterSpeed" min="20" max="300" value="100"><button class="step-btn" onclick="step('masterSpeed',10)">+</button></div></div>
            <div class="control-row"><label>GROWTH_FADE_SPD</label><div class="stepper"><button class="step-btn" onclick="step('fadeSpeed',-5)">-</button><input type="range" id="fadeSpeed" min="1" max="100" value="20"><button class="step-btn" onclick="step('fadeSpeed',5)">+</button></div></div>
        </div>

        <div class="grid-column">
            <div class="control-row"><label>P_FIELD_DENSITY</label><div class="stepper"><button class="step-btn" onclick="step('fieldDensity',-1)">-</button><input type="range" id="fieldDensity" min="2" max="25" value="8"><button class="step-btn" onclick="step('fieldDensity',1)">+</button></div></div>
            <div class="control-row"><label>PARTICLE_SIZE</label><div class="stepper"><button class="step-btn" onclick="step('particleSize',-2)">-</button><input type="range" id="particleSize" min="10" max="100" value="22"><button class="step-btn" onclick="step('particleSize',2)">+</button></div></div>
        </div>

        <div class="grid-column">
            <div class="action-group">
                <button class="btn-outline" id="growthBtn" style="height:40px; font-size:10px; letter-spacing:2px" onclick="toggleGrowth()">SYNTHETIC_GROWTH</button>
                <div class="sub-action-row">
                    <select id="growthMode" class="btn-outline" style="font-size:9px">
                        <option value="garden">BIO_MORPH // GARDEN</option>
                        <option value="slime">SYNTHETIC_SLIME</option>
                        <option value="coral">CORAL_BRANCH</option>
                        <option value="fluid">FLUID_TWIST</option>
                    </select>
                    <button id="settings-trigger" class="btn-outline" onclick="toggleSettings()">
                        <svg viewBox="0 0 24 24" width="16" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0-2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="settings-menu">
        <label>SYSTEM SETTINGS</label>
        <button class="btn-outline" onclick="toggleTheme()" style="padding:10px">LIGHT_MODE</button>
        <button id="pathBtn" class="btn-outline" onclick="toggleFileSystem()" style="padding:10px; font-size:9px">DIRECT_SAVE: OFF</button>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 10px;">AUDIO_ENGINE</span>
            <button id="pulseBtn" class="step-btn" style="width: 60px; height: 30px" onclick="togglePulse()">OFF</button>
        </div>
        <label>MASTER_VOL</label>
        <input type="range" id="masterVol" min="0" max="100" value="40">
    </div>

    <main id="viewport">
        <div id="chaos-container">
            <button id="recordBtn" onclick="toggleRecording()" title="RECORD_OUTPUT"></button>
            <input type="range" id="vChaos" class="vertical" min="0" max="100" value="0">
        </div>
        <div id="canvas-container"><canvas id="mainCanvas"></canvas></div>
        <div id="zoom-controls">
            <button class="zoom-btn" onclick="toggleProjectedView()" title="FULLSCREEN (F)">
                <svg viewBox="0 0 24 24" width="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
            <button class="zoom-btn" onclick="changeZoom(-0.1)">-</button>
            <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
            <button class="zoom-btn" style="font-size:9px; font-weight:bold" onclick="resetZoom()">1:1</button>
        </div>
    </main>
</div>

<script>
    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d', { alpha: false });
    const container = document.getElementById('canvas-container');
    const viewport = document.getElementById('viewport');
    const BAYER = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
    
    let imgSource = null, primaryOriginal = null, highResSource = null, pulseActive = false, pulseStep = 0, frameReq = false;
    let zoom = 1, panX = 0, panY = 0, isDragging = false, startX, startY;
    let growthActive = false, growthReq = null, agents = [], nutrientMap = [], trailMap = [];
    let useFileSystem = false, isFullscreen = false;

    const swellState = {
        KeyA: { id: 'pixelSize', target: 1, current: 1, step: 0.5, osc: null, gain: null, baseFreq: 110 },
        KeyS: { id: 'dither', target: 0, current: 0, step: 5, osc: null, gain: null, baseFreq: 440 },
        KeyD: { id: 'halftone', target: 0, current: 0, step: 0.4, osc: null, gain: null, baseFreq: 220 },
        KeyF: { id: 'aberration', target: 0, current: 0, step: 0.6, osc: null, gain: null, baseFreq: 330 },
        KeyG: { id: 'bloom', target: 0, current: 0, step: 0.8, osc: null, gain: null, baseFreq: 550 },
        KeyB: { id: 'bright', target: 0, current: 0, step: 2, osc: null, gain: null, baseFreq: 160 },
        KeyC: { id: 'cont', target: 0, current: 0, step: 2, osc: null, gain: null, baseFreq: 190 },
        KeyV: { id: 'saturate', target: 100, current: 100, step: 2, osc: null, gain: null, baseFreq: 240 },
        KeyN: { id: 'gamma', target: 10, current: 10, step: 0.5, osc: null, gain: null, baseFreq: 300 },
        KeyP: { id: 'grain', target: 0, current: 0, step: 2, osc: null, gain: null, baseFreq: 800 },
        KeyJ: { id: 'masterSpeed', target: 100, current: 100, step: 4, osc: null, gain: null, baseFreq: 150 },
        KeyK: { id: 'fadeSpeed', target: 20, current: 20, step: 2, osc: null, gain: null, baseFreq: 180 },
        KeyL: { id: 'particleSize', target: 22, current: 22, step: 1.5, osc: null, gain: null, baseFreq: 280 },
        Semicolon: { id: 'vChaos', target: 0, current: 0, step: 2, osc: null, gain: null, baseFreq: 80 }
    };
    const activeKeys = new Set();

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    viewport.addEventListener('mousedown', (e) => {
        if (isFullscreen || e.target !== viewport) return;
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || isFullscreen) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => isDragging = false);

    viewport.addEventListener('wheel', (e) => {
        if (isFullscreen) return;
        if (e.ctrlKey) {
            e.preventDefault();
            changeZoom(e.deltaY > 0 ? -0.1 : 0.1);
        } else {
            if (e.target === viewport) {
                panX -= e.deltaX;
                panY -= e.deltaY;
                updateTransform();
            }
        }
    }, { passive: false });

    function updateTransform() {
        container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    function toggleProjectedView() {
        const zoomControls = document.getElementById('zoom-controls');
        isFullscreen = !isFullscreen;
        if (isFullscreen) {
            container.classList.add('projected-fullscreen');
            container.style.transform = ""; 
            zoomControls.style.zIndex = "6000";
        } else {
            container.classList.remove('projected-fullscreen');
            zoomControls.style.zIndex = "1000";
            updateTransform();
        }
    }

    let audioCtx, masterGain, mainFilter, driveNode;
    let synthVoices = { pad: null, choir: null };
    const BIOMES = [ [1, 1.25, 1.5, 1.875, 2.25], [1, 1.2, 1.333, 1.5, 1.8], [0.8, 1, 1.2, 1.5, 2.0] ];
    let activeScale = BIOMES[0];

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        mainFilter = audioCtx.createBiquadFilter(); mainFilter.type = 'peaking'; 
        driveNode = audioCtx.createWaveShaper(); mainFilter.connect(driveNode); driveNode.connect(masterGain);
        updateAudioParams();
    }

    function createNoiseNode() {
        const bufferSize = 2 * audioCtx.sampleRate,
              buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
              output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        const whiteNoise = audioCtx.createBufferSource();
        whiteNoise.buffer = buffer; whiteNoise.loop = true;
        return whiteNoise;
    }

    function makeDistCurve(amount) {
        let n = 44100, curve = new Float32Array(n);
        for (let i = 0; i < n; ++i) { let x = i * 2 / n - 1; curve[i] = (3 + amount) * x * 20 * (Math.PI / 180) / (Math.PI + amount * Math.abs(x)); }
        return curve;
    }

    function updateAudioParams() {
        if(!audioCtx || !pulseActive) return; 
        const getV = (id) => parseFloat(document.getElementById(id).value);
        const spd = getV('masterSpeed') / 100;
        masterGain.gain.setTargetAtTime((getV('masterVol')/100)*0.15, audioCtx.currentTime, 0.05);
        mainFilter.frequency.setTargetAtTime(1500, audioCtx.currentTime, 0.1);
        mainFilter.gain.setTargetAtTime((getV('bright') / 2) + (getV('cont') / 2.5), audioCtx.currentTime, 0.05); 
        mainFilter.Q.setTargetAtTime(Math.abs(getV('cont')) / 4, audioCtx.currentTime, 0.05);
        driveNode.curve = makeDistCurve(getV('saturate')); 
        const baseF = (110 * (getV('gamma')/10)) * spd;
        updateVoice('pad', baseF, 'sine', getV('bloom')/400, 0); 
        updateVoice('choir', baseF * 4.0, 'sawtooth', (getV('scanLines') / 3000), (getV('aberration') * 60) * 1.5);
    }

    function runEngine() {
        if (!pulseActive) return;
        const getV = (id) => parseFloat(document.getElementById(id).value);
        const spd = getV('masterSpeed') / 100;
        const beat = (60 / 125 / 4) / spd;

        if (getV('glitchShift') > 5 && Math.random() > 0.75) {
            const glitchFreq = 200 + (getV('glitchShift') * 20);
            triggerOsc(glitchFreq * (0.5 + Math.random()), 'square', 0.05, getV('glitchShift')/400);
        }

        if (pulseStep % 4 === 0 && getV('pixelSize') > 1) triggerOsc((55 + getV('pixelSize')*2)*spd, 'sine', 0.2, 0.25); 
        if (pulseStep % 2 === 0 && getV('dither') > 20) triggerOsc((1000 + getV('dither'))*spd, 'triangle', 0.05, getV('dither')/500);
        if (getV('halftone') > 1 && pulseStep % 2 !== 0) triggerOsc((4000 + (getV('halftone')*100))*spd, 'sine', 0.01, getV('halftone')/150);
        if (getV('grain') > 5 && Math.random() > 0.4) triggerOsc((6000 + (Math.random()*6000))*spd, 'sine', 0.015, getV('grain')/500);
        if (getV('glitchShift') > 15 && Math.random() > 0.85) triggerOsc((Math.random()*800 + 50)*spd, 'square', 0.1, getV('glitchShift')/80);
        
        // Coral Engine Sprout sound
        if (document.getElementById('growthMode').value === 'coral' && growthActive && pulseStep % 4 === 0) {
            triggerOsc(1500 + (Math.random() * 1200), 'sine', 0.04, 0.08);
        }

        if (growthActive) {
            const root = (110 * (getV('gamma')/10)) * spd;
            if (pulseStep % 8 === 0) {
                const note = root * activeScale[Math.floor(Math.random() * activeScale.length)];
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(note, audioCtx.currentTime);

                g.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 1.5);

    }

    function triggerOsc(f, t, d, v) {
        if (!audioCtx || !pulseActive) return; 
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);

        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
    }

    function updateVoice(n, f, t, v, det) {
        if (!synthVoices[n]) {
            synthVoices[n] = { o: audioCtx.createOscillator(), g: audioCtx.createGain() };
            synthVoices[n].o.type = t; synthVoices[n].o.connect(synthVoices[n].g);
            synthVoices[n].g.connect(mainFilter); synthVoices[n].g.gain.value = 0; synthVoices[n].o.start();
        }
        synthVoices[n].o.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.1);
        synthVoices[n].o.detune.setTargetAtTime(det, audioCtx.currentTime, 0.1);
        synthVoices[n].g.gain.setTargetAtTime(v, audioCtx.currentTime, 0.2);
    }

    function togglePulse() {
        initAudio(); pulseActive = !pulseActive;
        document.getElementById('pulseBtn').innerText = pulseActive ? 'ON' : 'OFF';
        if (pulseActive) {
            updateAudioParams(); 
            runEngine();
        } else {
            Object.keys(synthVoices).forEach(k => { if(synthVoices[k]) synthVoices[k].g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2); });
            if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        }
    }

    function process() {
        if (!imgSource || growthActive) return;
        const w = canvas.width = imgSource.width, h = canvas.height = imgSource.height;
        ctx.drawImage(imgSource, 0, 0);
        applyLivePostProcessing(canvas, ctx);
    }

    function applyLivePostProcessing(targetCanvas, targetCtx) {
        const w = targetCanvas.width, h = targetCanvas.height;
        const getV = (id) => parseFloat(document.getElementById(id).value);
        const pSize = Math.max(1, Math.round(getV('pixelSize'))), 
              ditherAmt = getV('dither'), 
              htSize = Math.round(getV('halftone')), 
              abAmt = getV('aberration'), 
              glitchShift = getV('glitchShift'), 
              bloomAmt = getV('bloom'), 
              scanAmt = getV('scanLines'), 
              grainAmt = getV('grain'), 
              br = getV('bright'), 
              ct = (getV('cont') + 100) / 100, 
              gaInv = 1 / (getV('gamma') / 10), 
              sat = getV('saturate') / 100;

        let imgData = targetCtx.getImageData(0, 0, w, h), d = imgData.data;

        for (let i = 0; i < d.length; i += 4) {
            let r = (d[i] + br - 128) * ct + 128, g = (d[i+1] + br - 128) * ct + 128, b = (d[i+2] + br - 128) * ct + 128;
            if (sat !== 1.0) { const gray = 0.299*r + 0.587*g + 0.114*b; r = gray + sat*(r-gray); g = gray + sat*(g-gray); b = gray + sat*(b-gray); }
            if (gaInv !== 1.0) { r = 255 * Math.pow(Math.max(0,r)/255, gaInv); g = 255 * Math.pow(Math.max(0,g)/255, gaInv); b = 255 * Math.pow(Math.max(0,b)/255, gaInv); }
            d[i] = r; d[i+1] = g; d[i+2] = b;
        }

        if (pSize > 1 || ditherAmt > 0) applyPixelation(d, w, h, pSize, ditherAmt);

        if (htSize > 1) {
            const temp = new Uint8ClampedArray(d); d.fill(0);
            for (let y = 0; y < h; y += htSize) for (let x = 0; x < w; x += htSize) {
                const i = (y * w + x) * 4, rad = (htSize/2) * ((temp[i]+temp[i+1]+temp[i+2])/765);
                for (let yy = -htSize; yy < htSize; yy++) for (let xx = -htSize; xx < htSize; xx++)
                    if (xx*xx + yy*yy < rad*rad) { const tx = x + xx, ty = y + yy; if (tx >= 0 && tx < w && ty >= 0 && ty < h) { const idx = (ty * w + tx) * 4; d[idx] = temp[i]; d[idx+1] = temp[i+1]; d[idx+2] = temp[i+2]; d[idx+3] = 255; } }
            }
        }

        if (glitchShift > 0 && !growthActive) { 
            const temp = new Uint8ClampedArray(d);
            for (let y = 0; y < h; y++) if (Math.random() > 0.97) {
                const s = Math.floor((Math.random()-0.5) * glitchShift * 2);
                for (let x = 0; x < w; x++) { const tx=(x+s+w)%w, sI=(y*w+x)*4, dI=(y*w+tx)*4; d[dI]=temp[sI]; d[dI+1]=temp[sI+1]; d[dI+2]=temp[sI+2]; }
            }
        }

        if (abAmt > 0) { const buf = new Uint8ClampedArray(d), off = abAmt * 4; for (let i = 0; i < d.length; i += 4) { if (i >= off) d[i] = buf[i - off]; if (i + off < d.length) d[i+2] = buf[i + off + 2]; } }
        
        targetCtx.putImageData(imgData, 0, 0);
        if (bloomAmt > 0) { targetCtx.globalCompositeOperation = 'screen'; targetCtx.filter = `blur(${bloomAmt}px) brightness(1.1)`; targetCtx.drawImage(targetCanvas, 0, 0); targetCtx.filter = 'none'; targetCtx.globalCompositeOperation = 'source-over'; }
        if (scanAmt > 0) { targetCtx.fillStyle = `rgba(0,0,0,${scanAmt/100})`; for(let y=0; y<h; y+=3) targetCtx.fillRect(0, y, w, 1); }
        if (grainAmt > 0) { targetCtx.fillStyle = `rgba(255,255,255,${grainAmt/400})`; for (let i=0; i<(w*h*(grainAmt/100)); i++) targetCtx.fillRect(Math.random()*w, Math.random()*h, 1, 1); }
    }

    function applyPixelation(data, w, h, pSize, ditherAmt) {
        let src = new Uint8ClampedArray(data);
        for (let y = 0; y < h; y += pSize) for (let x = 0; x < w; x += pSize) {
            const i = (y * w + x) * 4;
            let r = src[i], g = src[i+1], b = src[i+2];
            if (ditherAmt > 0) {
                const thresh = (BAYER[(y/pSize)%4][(x/pSize)%4] / 16) * ditherAmt;
                r = r + thresh > 128 ? 255 : 0; g = g + thresh > 128 ? 255 : 0; b = b + thresh > 128 ? 255 : 0;
            }
            for (let yy=0; yy<pSize && y+yy < h; yy++) for (let xx=0; xx<pSize && x+xx < w; xx++) {
                const idx = ((y+yy)*w + (x+xx))*4; data[idx]=r; data[idx+1]=g; data[idx+2]=b;
            }
        }
    }

    function toggleGrowth() {
        if (!imgSource) return;
        if (!growthActive) {
            const baked = new Image();
            baked.onload = () => {
                imgSource = baked;
                resetSlidersOnly(true); 
                growthActive = true;
                document.getElementById('growthBtn').innerText = 'STOP_GROWTH';
                initGrowth();
                growthLoop();
            };
            baked.src = canvas.toDataURL(); 
        } else {
            growthActive = false;
            cancelAnimationFrame(growthReq);
            document.getElementById('growthBtn').innerText = 'SYNTHETIC_GROWTH';
            const baked = new Image();
            baked.onload = () => { imgSource = baked; process(); };
            baked.src = canvas.toDataURL();
        }
    }

    function calculateChaosOffset(x, y, time, chaos) {
        const waveA = Math.sin(time * 2 + x * 0.02) * (chaos * 80);
        const waveB = Math.cos(time * 1.5 + y * 0.03) * (chaos * 80);
        const dx = (waveA * Math.cos(time)) + (waveB * Math.sin(time));
        const dy = (waveB * Math.cos(time)) + (waveA * Math.sin(time));
        return { x: dx, y: dy };
    }

    function createPlant(x, y, imgData) {
        const w = canvas.width;
        const i = (Math.floor(y) * w + Math.floor(x)) * 4;
        const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
        const petalLayers = [{ count: 3 + Math.floor(Math.random()*3), scale: 0.6, alpha: 0.4 }, { count: 5 + Math.floor(Math.random()*5), scale: 1.0, alpha: 0.8 }];
        const petalData = petalLayers.map(layer => {
            const petals = [];
            for(let p=0; p < layer.count; p++) petals.push({ angle: (p / layer.count) * Math.PI * 2 + (Math.random() * 0.5), len: (2 + Math.random() * 6) * layer.scale, width: (1.5 + Math.random() * 2) * layer.scale, veins: 2 + Math.floor(Math.random() * 3) });
            return { petals, alpha: layer.alpha };
        });
        return { baseX: x, baseY: y, height: 0, maxHeight: 30 + Math.random() * 110, curveX: (Math.random() - 0.5) * 60, droopForce: 0.2 + Math.random() * 0.5, color: `rgb(${r},${g},${b})`, veinColor: `rgb(${Math.max(0, r-40)},${Math.max(0, g-40)},${Math.max(0, b-40)})`, bloomColor: `rgb(${r},${g},${b})`, coreColor: `rgb(${Math.min(255, r+50)},${Math.min(255, g+40)},${Math.min(255, b+20)})`, layers: petalData, swayOffset: Math.random() * Math.PI * 2, thickness: 0.5 + Math.random() * 2.5, state: 'growing', life: 0, maxLife: 300 + Math.random() * 600 };
    }

    function initGrowth() {
        const w = canvas.width, h = canvas.height, mode = document.getElementById('growthMode').value, density = parseInt(document.getElementById('fieldDensity').value);
        agents = []; nutrientMap = new Float32Array(w * h); trailMap = new Float32Array(w * h).fill(0);
        activeScale = BIOMES[Math.floor(Math.random() * BIOMES.length)];
        const data = ctx.getImageData(0, 0, w, h).data;
        if (mode === 'garden') {
            const stepSize = density * 2;
            for (let y = h; y > 0; y -= stepSize) for (let x = 0; x < w; x += stepSize) { const i = (y * w + x) * 4; const br = (data[i] + data[i+1] + data[i+2]) / 3; if (br > 40 && Math.random() > 0.8) agents.push(createPlant(x, y, data)); }
        } else if (mode === 'slime') {
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) { const i = (y * w + x) * 4, br = (data[i] + data[i+1] + data[i+2]) / 3, sat = Math.max(data[i], data[i+1], data[i+2]) - Math.min(data[i], data[i+1], data[i+2]) - Math.min(data[i], data[i+1], data[i+2]); nutrientMap[y * w + x] = br / 255; if ((sat > 150 || br > 200) && Math.random() > 0.985) for(let k=0; k<10; k++) agents.push({ x: x, y: y, angle: Math.random() * Math.PI * 2, color: `rgb(${data[i]},${data[i+1]},${data[i+2]})` }); }
        } else if (mode === 'coral') {
            for (let i = 0; i < 25; i++) {
                let rx = Math.random() * w, ry = Math.random() * h;
                let idx = (Math.floor(ry) * w + Math.floor(rx)) * 4;
                agents.push({
                    x: rx, y: ry,
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.7 + Math.random(),
                    life: 1.0,
                    thickness: 1.2 + Math.random() * 2,
                    color: `rgb(${data[idx]}, ${data[idx+1]}, ${data[idx+2]})`
                });
            }
        } else {
            for (let y = 0; y < h; y += density) for (let x = 0; x < w; x += density) { const i = (y * w + x) * 4; agents.push({ ox: x, oy: y, x: x, y: y, color: `rgb(${data[i]},${data[i+1]},${data[i+2]})` }); }
        }
    }

    function growthLoop() {
        if (!growthActive) return;
        const w = canvas.width, h = canvas.height, mode = document.getElementById('growthMode').value, spd = parseFloat(document.getElementById('masterSpeed').value) / 100;
        const pSize = parseFloat(document.getElementById('particleSize').value) / 10;
        const chaos = parseFloat(document.getElementById('vChaos').value) / 100;
        const fadeAmt = (Math.pow(parseFloat(document.getElementById('fadeSpeed').value) / 200, 2) * 0.1).toFixed(4);
        
        ctx.fillStyle = `rgba(0,0,0,${fadeAmt})`; ctx.fillRect(0, 0, w, h);

        if (mode === 'garden') {
            const t = performance.now() / 1500 * spd, wind = (chaos * 40) + 5, sourceData = primaryOriginal ? ctx.getImageData(0,0,w,h).data : null; 
            agents.forEach((a, idx) => {
                if (a.state === 'growing') { a.height += 0.6 * spd; if (a.height >= a.maxHeight) a.state = 'blooming'; }
                else if (a.state === 'blooming') { a.life++; if (a.life > a.maxLife) a.state = 'decaying'; }
                else if (a.state === 'decaying') { a.height -= 0.4 * spd; if (a.height <= 0) agents[idx] = createPlant(a.baseX, a.baseY, sourceData || new Uint8Array(w*h*4)); }
                const maturity = a.height / a.maxHeight, droop = (a.state === 'blooming' || a.state === 'decaying') ? (maturity * 15 * a.droopForce) : 0;
                const sway = Math.sin(t + (a.baseX * 0.05) + a.swayOffset) * (wind * maturity), tipX = a.baseX + sway + (a.curveX * maturity), tipY = a.baseY - a.height + droop;
                ctx.beginPath(); ctx.moveTo(a.baseX, a.baseY); ctx.quadraticCurveTo(a.baseX + (sway * 0.3), a.baseY - (a.height * 0.6), tipX, tipY); ctx.strokeStyle = a.color; ctx.lineWidth = a.thickness; ctx.globalAlpha = a.state === 'decaying' ? 0.2 : 0.6; ctx.stroke();
                if (a.height > a.maxHeight * 0.6) {
                    const bloomScale = Math.min(1, (a.height - (a.maxHeight * 0.6)) / (a.maxHeight * 0.4)) * pSize;
                    ctx.save(); ctx.translate(tipX, tipY); ctx.rotate((sway * 0.05) + (droop * 0.02)); 
                    a.layers.forEach(layer => {
                        ctx.globalAlpha = (a.state === 'decaying' ? 0.2 : layer.alpha);
                        layer.petals.forEach(p => {
                            const pLen = p.len * bloomScale, pWid = p.width * bloomScale;
                            ctx.beginPath(); ctx.ellipse(0, 0, pLen, pWid, p.angle + (t * 0.05), 0, Math.PI * 2); ctx.fillStyle = a.bloomColor; ctx.fill();
                            ctx.beginPath(); ctx.strokeStyle = a.veinColor; ctx.lineWidth = 0.5;
                            for(let v=0; v<p.veins; v++) { const vAng = p.angle + (t * 0.05) + (v-1)*0.2; ctx.moveTo(0,0); ctx.lineTo(Math.cos(vAng)*pLen*0.8, Math.sin(vAng)*pLen*0.8); }
                            ctx.stroke();
                        });
                    });
                    ctx.beginPath(); ctx.arc(0, 0, bloomScale * 0.8, 0, Math.PI * 2); ctx.fillStyle = a.coreColor; ctx.globalAlpha = 0.9; ctx.fill(); ctx.restore();
                }
            });
        } else if (mode === 'slime') {
            const sensorDist = 18 + (chaos * 20), sensorAngle = 0.4 + (chaos * 0.5), moveSpeed = 0.75 * spd;
            agents.forEach(a => {
                const getVal = (ang) => { const sx = Math.floor(a.x + Math.cos(a.angle + ang) * sensorDist), sy = Math.floor(a.y + Math.sin(a.angle + ang) * sensorDist); if (sx < 0 || sx >= w || sy < 0 || sy >= h) return -1; return nutrientMap[sy * w + sx] + (trailMap[sy * w + sx] * 2); };
                const f = getVal(0), fl = getVal(-sensorAngle), fr = getVal(sensorAngle);
                if (f < fl && f < fr) a.angle += (Math.random() - 0.5) * 2 * sensorAngle; else if (fl < fr) a.angle += sensorAngle; else if (fr < fl) a.angle -= sensorAngle;
                a.x = (a.x + Math.cos(a.angle) * moveSpeed + w) % w; a.y = (a.y + Math.sin(a.angle) * moveSpeed + h) % h;
                const idx = Math.floor(a.y) * w + Math.floor(a.x); trailMap[idx] = Math.min(1.0, trailMap[idx] + 0.12);
                ctx.beginPath(); ctx.arc(a.x, a.y, pSize, 0, Math.PI * 2); ctx.fillStyle = a.color; ctx.globalAlpha = 0.65; ctx.fill();
            });
            for (let i = 0; i < trailMap.length; i++) trailMap[i] *= 0.95; 
        } else if (mode === 'coral') {
            const moveSpeed = (0.5 + (chaos * 0.6)) * spd;
            const branchChance = 0.02 + (chaos * 0.08);
            const sourceData = ctx.getImageData(0, 0, w, h).data;
            for (let i = agents.length - 1; i >= 0; i--) {
                const a = agents[i];
                if (a.life <= 0) { agents.splice(i, 1); continue; }
                const ix = Math.floor(a.x), iy = Math.floor(a.y);
                const idx = (iy * w + ix) * 4;
                const sensorDist = 12;
                const leftAng = a.angle - 0.5, rightAng = a.angle + 0.5;
                const getLum = (ang) => {
                    const sx = Math.floor(a.x + Math.cos(ang) * sensorDist), sy = Math.floor(a.y + Math.sin(ang) * sensorDist);
                    if (sx < 0 || sx >= w || sy < 0 || sy >= h) return -1;
                    const sIdx = (sy * w + sx) * 4;
                    return sourceData[sIdx] + sourceData[sIdx+1] + sourceData[sIdx+2];
                };
                if (getLum(leftAng) > getLum(rightAng)) a.angle -= 0.12; 
                else if (getLum(rightAng) > getLum(leftAng)) a.angle += 0.12;
                a.angle += (Math.random() - 0.5) * 0.1;
                ctx.beginPath(); ctx.moveTo(a.x, a.y);
                a.x += Math.cos(a.angle) * moveSpeed; a.y += Math.sin(a.angle) * moveSpeed;
                ctx.lineTo(a.x, a.y);
                if (ix >= 0 && ix < w && iy >= 0 && iy < h) a.color = `rgb(${sourceData[idx]}, ${sourceData[idx+1]}, ${sourceData[idx+2]})`;
                ctx.strokeStyle = a.color; ctx.lineWidth = a.thickness * a.life * pSize; ctx.globalAlpha = 0.6; ctx.lineCap = 'round'; ctx.stroke();
                a.life -= 0.003 * (1/spd);
                if (Math.random() < branchChance && agents.length < 1200) {
                    agents.push({ ...a, angle: a.angle + (Math.random() - 0.5) * 1.8, life: a.life * 0.8, thickness: a.thickness * 0.7 });
                }
            }
            if (agents.length < 5 && Math.random() > 0.98) initGrowth();
        } else {
            const t = performance.now() / 2500 * spd;
            agents.forEach(a => {
                const offset = calculateChaosOffset(a.ox, a.oy, t, chaos);
                a.x = a.ox + Math.sin(t + a.ox * 0.01) * 20 + offset.x; a.y = a.oy + Math.cos(t * 0.5 + a.oy * 0.01) * 20 + offset.y;
                ctx.beginPath(); ctx.arc(a.x, a.y, pSize, 0, Math.PI * 2); ctx.fillStyle = a.color; ctx.fill();
            });
        }

        applyLivePostProcessing(canvas, ctx);
        growthReq = requestAnimationFrame(growthLoop);
    }

    function step(id, delta) { 
        const el = document.getElementById(id); 
        el.value = parseFloat(el.value) + delta; 
        const key = Object.keys(swellState).find(k => swellState[k].id === id);
        if (key) swellState[key].target = parseFloat(el.value);
        req(); 
    }
    
    function resetZoom() { 
        if (!imgSource) return;
        const vw = viewport.clientWidth - 40, vh = viewport.clientHeight - 40, scale = Math.min(vw / imgSource.width, vh / imgSource.height, 1);
        zoom = scale; panX = 0; panY = 0; updateTransform();
    }

    function resetSlidersOnly(onlyPhoto = false) {
        const photoDefaults = { pixelSize:1, dither:0, halftone:0, bloom:0, scanLines:0, grain:0, aberration:0, glitchShift:0, bright:0, cont:0, saturate:100, gamma:10 };
        const applySet = (defs) => {
            Object.keys(defs).forEach(id => { 
                const el = document.getElementById(id);
                if(el) {
                    el.value = defs[id];
                    const key = Object.keys(swellState).find(k => swellState[k].id === id);
                    if (key) { swellState[key].target = defs[id]; swellState[key].current = defs[id]; }
                }
            });
        };
        applySet(photoDefaults);
        if (!onlyPhoto) {
            const growthDefaults = { vChaos:0, masterSpeed:100, fadeSpeed:20, particleSize:22 };
            applySet(growthDefaults);
        }
        updateAudioParams();
    }

    function resetSystem() { growthActive = false; cancelAnimationFrame(growthReq); document.getElementById('growthBtn').innerText = 'SYNTHETIC_GROWTH'; if (primaryOriginal) imgSource = primaryOriginal; resetSlidersOnly(false); resetZoom(); process(); }
    function req() { if(pulseActive) updateAudioParams(); if (!frameReq) { frameReq = true; requestAnimationFrame(() => { process(); frameReq = false; }); } }
    
    document.querySelectorAll('input[type="range"]').forEach(i => {
        i.oninput = () => {
            const key = Object.keys(swellState).find(k => swellState[k].id === i.id);
            if (key) swellState[key].target = parseFloat(i.value);
            req();
        }
    });
    
    document.getElementById('upload').onchange = (e) => { 
        const file = e.target.files[0]; if (!file) return;
        const r = new FileReader(); r.onload = (f) => { 
            const nI = new Image(); nI.onload = async () => { 
                highResSource = nI; 
                const maxDim = 1280;
                const scale = Math.min(1, maxDim / Math.max(nI.width, nI.height));
                const tmp = document.createElement('canvas'); tmp.width = nI.width * scale; tmp.height = nI.height * scale;
                const tCtx = tmp.getContext('2d'); tCtx.drawImage(nI, 0, 0, tmp.width, tmp.height);
                const lightImg = new Image(); lightImg.onload = () => {
                    primaryOriginal = imgSource = lightImg; resetSlidersOnly(false); req(); setTimeout(resetZoom, 100);
                }; lightImg.src = tmp.toDataURL();
            }; nI.src = f.target.result; 
        }; r.readAsDataURL(file); 
    };

    function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleFileSystem() { useFileSystem = !useFileSystem; document.getElementById('pathBtn').innerText = useFileSystem ? 'DIRECT_SAVE: ON' : 'DIRECT_SAVE: OFF'; }
    function changeZoom(d) { zoom = Math.max(0.05, zoom + d); updateTransform(); }

    function updateSwell() {
        Object.keys(swellState).forEach(key => {
            const state = swellState[key], el = document.getElementById(state.id), maxVal = parseFloat(el.max);
            if (activeKeys.has(key)) {
                if (state.current < maxVal) { 
                    state.current = Math.min(maxVal, state.current + state.step); 
                    el.value = state.current; 
                    if(!growthActive) req(); 
                }
                if (pulseActive && audioCtx && state.gain) { 
                    state.gain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1); 
                    if (state.osc) {
                        const jitter = (key === 'KeyP' || key === 'KeyF') ? (Math.random() * 50) : 0;
                        state.osc.frequency.setTargetAtTime(state.baseFreq + (state.current * 2) + jitter, audioCtx.currentTime, 0.1); 
                    }
                }
            } else {
                if (Math.abs(state.current - state.target) > 0.1) {
                    state.current += (state.target - state.current) * 0.2; 
                    el.value = state.current;
                    if(!growthActive) req();
                } else { state.current = state.target; el.value = state.target; }
                if (state.gain) state.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
            }
        });
        requestAnimationFrame(updateSwell);
    }
    updateSwell(); 

    window.onkeydown = (e) => { 
        if (e.repeat) return;
        if (e.code === 'Space') { e.preventDefault(); toggleGrowth(); } 
        if (e.code === 'Tab') { e.preventDefault(); toggleProjectedView(); }
        if (e.code === 'Digit1') { document.getElementById('growthMode').value = 'slime'; if(growthActive) initGrowth(); }
        if (e.code === 'Digit2') { document.getElementById('growthMode').value = 'garden'; if(growthActive) initGrowth(); }
        if (e.code === 'Digit3') { document.getElementById('growthMode').value = 'fluid'; if(growthActive) initGrowth(); }
        if (e.code === 'Digit4') { document.getElementById('growthMode').value = 'coral'; if(growthActive) initGrowth(); }

        if (swellState[e.code]) {
            if (!pulseActive) return; 
            initAudio(); activeKeys.add(e.code);
            const state = swellState[e.code]; 
            state.target = parseFloat(document.getElementById(state.id).value);
            
            if (audioCtx && !state.osc) {
                state.osc = audioCtx.createOscillator(); state.gain = audioCtx.createGain(); state.gain.gain.value = 0;
                if (e.code === 'KeyP') {
                    const noise = createNoiseNode(); const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass'; filter.frequency.value = 1500;
                    noise.connect(filter); filter.connect(state.gain);
                    noise.start(); state.noiseNode = noise;
                } else {
                    state.osc.type = (e.code === 'KeyF' || e.code === 'KeyP') ? 'square' : 'sawtooth';
                    state.osc.connect(state.gain); state.osc.start();
                }
                state.gain.connect(masterGain);
            }
        }
    };

    window.onkeyup = (e) => {
        if (swellState[e.code]) {
            activeKeys.delete(e.code);
            const state = swellState[e.code];
            if (state.osc) { 
                const stopTime = audioCtx.currentTime + 0.5; 
                state.gain.gain.exponentialRampToValueAtTime(0.001, stopTime); 
                state.osc.stop(stopTime); state.osc = null; 
            }
            if (state.noiseNode) { state.noiseNode.stop(); state.noiseNode = null; }
        }
    };

    function exportImg() {
        if (!imgSource) return;
        const link = document.createElement('a');
        link.download = `TRM_EXP_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }

    async function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        if (!isRecording) {
            recordedChunks = []; if (!audioCtx) initAudio();
            const canvasStream = canvas.captureStream(30);
            let combinedStream;
            
            if (pulseActive && audioCtx) {
                const audioDest = audioCtx.createMediaStreamDestination();
                masterGain.connect(audioDest);
                combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
            } else {
                combinedStream = new MediaStream([...canvasStream.getVideoTracks()]);
            }

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"', videoBitsPerSecond: 8000000 });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' }), url = URL.createObjectURL(blob), a = document.createElement('a');
                a.href = url; a.download = `TRM_PROC_${Date.now()}.mp4`; a.click(); URL.revokeObjectURL(url);
            };
            mediaRecorder.start(); isRecording = true;
            btn.style.background = '#ff4444'; btn.style.borderRadius = '4px'; btn.style.boxShadow = '0 0 20px #ffffff';
        } else { mediaRecorder.stop(); isRecording = false; btn.style.background = '#ff4444'; btn.style.borderRadius = '50%'; btn.style.boxShadow = '0 0 10px rgba(255, 68, 68, 0.4)'; }
    }
</script>
